<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Build PC</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

  <div class="header">
   <div class="logo-title">
      <img src="images/TssLogo.jpg" class="logo" >
      <h2>XÂY DỰNG CẤU HÌNH PC</h2>
    </div>
    <button onclick="resetBuild()">LÀM MỚI ↻</button>
    <div class="total">Tổng: <span id="totalTop">0</span></div>
  </div>

  <table class="pc-table">
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Bảo hành</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

  <div class="footer">
    Tổng tiền: <span id="totalBottom">0</span>
  </div>
<button onclick="exportExcel()">Xuất Excel</button>
</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="/js/script.js" ></script>

</body>
</html>
