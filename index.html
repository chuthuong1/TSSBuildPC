<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Build PC</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/Downloadimg.css">
</head>
<body>

<div class="container">

  <div class="header">
   <div class="logo-title">
      <img src="images/background.jpg" class="logo" >
      <h2>XÂY DỰNG CẤU HÌNH PC</h2>
    </div>
    
    <!-- <div class="total">Tổng: <span id="totalTop">0</span></div> -->
  </div>

  <table class="pc-table">
    <thead>
      <tr>
        <th disabled>STT</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Bảo hành</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
    <tfoot>
      <tr>
        <td colspan="4" class="total-label">TỔNG TIỀN THANH TOÁN:</td>
        <td class="total-amount"><span id="totalBottom">0</span></td>
      </tr>
    </tfoot>
  </table>


  
  <div class="button-group">
  <button class="btn btn-excel" onclick="handleExport()">
    <span>📊</span> Xuất Excel
  </button>
  <button class="btn btn-download" onclick="previewImage()">
    <span>📥</span> Tải ảnh xuống
  </button>
  <button class="btn btn-reset" onclick="resetBuild()">
    ↻ LÀM MỚI
  </button>
</div>

</div> <div id="previewModal" class="preview-modal" style="display: none;">
  <div class="preview-content">
    <span class="close-btn" onclick="closePreview()">&times;</span>
    <h3 style="margin-top: 0; color: #1D3F95;">Xem trước ảnh bảng giá</h3>
    
    <img id="previewImageSrc" src="" alt="Ảnh xem trước">
    
    <div class="modal-actions">
      <button onclick="downloadFromPreview()" style="background: green; color: white;">✔ Xác nhận Tải xuống</button>
      <button onclick="closePreview()" style="background: gray; color: white;">✖ Hủy</button>
    </div>
  </div>
</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="js/exportExcel.js"></script>
<script src="js/script.js"></script>
<script src="js/Downloadimg.js"></script>

</body>
</html>
